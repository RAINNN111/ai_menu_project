<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f6fa;
            font-family: Arial, sans-serif;
        }

        .login-container {
            position: fixed;

            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        /* ✅ 遮罩层 */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        /* ✅ 弹窗 */
        #register-modal {
            display: none;
            position: fixed;

            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 400px;
            padding: 40px;

            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);

            text-align: center;

            z-index: 1000;
        }

        #register-modal input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        #register-modal button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #register-modal button:first-of-type {
            background-color: #007bff;
            color: white;
        }

        #register-modal button:last-of-type {
            background-color: #ccc;
        }
        /* ================= flavor 区域 ================= */
        .flavor-box {
            background: #fff7f9;
            border: 1px solid #ffd6e2;
            border-radius: 12px;

            padding: 12px;
            margin: 10px 0;
        }

        /* 标题 */
        .flavor-box p {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #d46a8c;
            font-weight: bold;
        }

        /* checkbox 变成“标签风格” */
        .flavor-box label {
            display: inline-block;
            margin: 5px 6px;

            padding: 6px 10px;
            border-radius: 20px;

            background: #fff;
            border: 1px solid #eee;

            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
        }

        /* hover */
        .flavor-box label:hover {
            background: #ffe3ea;
            border-color: #f5a9c2;
        }

        /* checkbox 本身隐藏 */
        .flavor-box input {
            margin-right: 4px;
        }
            </style>
</head>

<body>

<div class="login-container">
    <h2>ログイン画面</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="username"><br>
        <input type="password" name="password" placeholder="password"><br>
        <button type="submit">Login</button>
    </form>

    <p>
        アカウントをお持ちでない方はこちら 
        <a href="#" onclick="openRegister()">新規登録</a>
    </p>
</div>

<!-- 遮罩 -->
<div id="overlay" onclick="closeRegister()"></div>

<!-- 注册弹窗 -->
<div id="register-modal">
    <h3>新規登録画面</h3>

    <input type="text" id="reg-username" placeholder="ユーザー名"><br>
    <input type="password" id="reg-password" placeholder="パスワード"><br><br>
    <div class="flavor-box">

        <p>🍰 好きなフレーバーを選んでください（複数可）</p>

        <label><input type="checkbox" value="chocolate"> チョコレート</label>
        <label><input type="checkbox" value="strawberry"> いちご</label>
        <label><input type="checkbox" value="cheese"> チーズ</label>
        <label><input type="checkbox" value="tiramisu"> ティラミス</label>

    </div>

    <button onclick="register()">登録</button>
    <button onclick="closeRegister()">閉じる</button>
</div>

<script>
function openRegister() {
    document.getElementById("register-modal").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function closeRegister() {
    document.getElementById("register-modal").style.display = "none";
    document.getElementById("overlay").style.display = "none";
}

/* ✅ Django CSRF 获取 */
function getCSRFToken() {
    return document.querySelector('[name=csrfmiddlewaretoken]').value;
}

/* 注册功能 */
function register() {

    const username = document.getElementById("reg-username").value;
    const password = document.getElementById("reg-password").value;

    // ===== 🍰 获取 checkbox =====
    let flavors = [];
    document.querySelectorAll(".flavor-box input:checked").forEach(cb => {
        flavors.push(cb.value);
    });

    if (!username || !password) {
        alert("ユーザー名とパスワードを入力してください");
        return;
    }

    fetch("/register/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({
            username: username,
            password: password,
            flavors: flavors   // ⭐关键
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else {
            alert("登録が完了しました！");
            closeRegister();
        }
    });
}
</script>

</body>
</html>
