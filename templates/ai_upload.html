<!DOCTYPE html>
<html>
<head>
    <title>AI识别点菜</title>
</head>
<body>
    <h2>上传图片识别菜品 🤖</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="image">
        <button type="submit">识别</button>
    </form>

    {% if result %}
        <h3>识别结果: {{ result }}</h3>
    {% endif %}

    {% if menus %}
        <h3>推荐菜单：</h3>
        {% for item in menus %}
            <p>{{ item.name }} - {{ item.price }}円</p>
        {% endfor %}
    {% endif %}
</body>
</html>
